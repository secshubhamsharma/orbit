name: orbitapp
description: "AI flashcards & smart quizzes for school, exams & certifications."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # state management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # navigation
  go_router: ^13.2.0

  # firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.7.0
  firebase_messaging: ^14.7.19
  firebase_analytics: ^10.9.0
  firebase_crashlytics: ^3.5.0

  # auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # ui & animations
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1

  # local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # networking
  dio: ^5.4.3

  # device
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  image_picker: ^1.0.7
  flutter_local_notifications: ^17.1.2

  # ocr & pdf
  google_mlkit_document_scanner: ^0.1.0
  syncfusion_flutter_pdf: ^24.1.41

  # utils
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env
